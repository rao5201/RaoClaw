version: '3.8'

services:
  # 网站服务
  web:
    image: nginx:alpine
    container_name: raoclaw_web
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./script.js:/usr/share/nginx/html/script.js:ro
    ports:
      - "8080:80"
    networks:
      - raoclaw_network
    restart: unless-stopped

  # 后端 API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raoclaw_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres_password_2026@db:5432/rao5201_db
    depends_on:
      - db
    networks:
      - raoclaw_network
    restart: unless-stopped

  # 数据库（使用中央数据库）
  db:
    image: postgres:15-alpine
    container_name: raoclaw_db
    environment:
      POSTGRES_DB: rao5201_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_2026
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - raoclaw_network
    restart: unless-stopped

networks:
  raoclaw_network:
    driver: bridge
